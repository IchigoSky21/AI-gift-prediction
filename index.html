<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KadoTepat - AI Gift Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(236, 72, 153, 0.2); border-radius: 50%; border-top: 3px solid #ec4899; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        .spinner-large { width: 40px; height: 40px; border-width: 4px; border-top-width: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-white to-purple-50 text-gray-800 p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="text-center space-y-3 fade-in">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900">Kado<span class="text-pink-600">Tepat</span></h1>
            <p class="text-lg text-gray-600">Asisten AI pencari kado sempurna.</p>
        </div>

        <div class="grid md:grid-cols-12 gap-8 items-start fade-in">
            <div class="md:col-span-5 bg-white rounded-2xl shadow-xl shadow-pink-100/50 p-6 border border-gray-100">
                <form id="giftForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="hubungan" id="hubungan" class="w-full p-2.5 rounded-lg border border-gray-300">
                            <option value="Teman">Teman</option>
                            <option value="Pacar">Pacar</option>
                            <option value="Suami/Istri">Suami/Istri</option>
                        </select>
                        <select name="acara" id="acara" class="w-full p-2.5 rounded-lg border border-gray-300">
                            <option value="Ulang Tahun">Ulang Tahun</option>
                            <option value="Anniversary">Anniversary</option>
                        </select>
                    </div>
                    <input type="number" id="usia" placeholder="Usia (Cth: 25)" required class="w-full p-2.5 rounded-lg border border-gray-300" />
                    <textarea id="hobi" placeholder="Hobi atau minat..." required rows="3" class="w-full p-2.5 rounded-lg border border-gray-300"></textarea>
                    <input type="number" id="budget" placeholder="Budget Maksimal (Rp)" required class="w-full p-2.5 rounded-lg border border-gray-300" />
                    <button type="submit" id="submitBtn" class="w-full bg-pink-600 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2">
                        <span id="btnText">Temukan Kado Terbaik</span>
                        <div id="btnSpinner" class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <div class="md:col-span-7">
                <div id="filterSection" class="hidden flex gap-2 mb-4">
                    <button onclick="filterResults('lebih murah')" class="text-xs bg-pink-100 text-pink-700 px-3 py-1 rounded-full hover:bg-pink-200">💰 Lebih Murah</button>
                    <button onclick="filterResults('lebih unik')" class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full hover:bg-purple-200">✨ Lebih Unik</button>
                </div>
                <div id="loadingState" class="hidden h-64 flex items-center justify-center">
                    <div class="spinner-large"></div>
                </div>
                <div id="resultsContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan API Key Anda di sini
        const part1 = "AQ.Ab8RN6IMlDhWNh55tS8";
        const part2 = "foeK-K_9NWhZDImvaqQsg_mmy7vA1Sg";
        const GEMINI_API_KEY = part1 + part2;

        // Fitur Favorit
        function toggleFavorite(btn, namaKado) {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if (favs.includes(namaKado)) {
                favs = favs.filter(i => i !== namaKado);
                btn.style.color = 'gray';
            } else {
                favs.push(namaKado);
                btn.style.color = '#db2777';
            }
            localStorage.setItem('favs', JSON.stringify(favs));
        }

        // Fitur Share WA
        function shareWA(nama, harga) {
            const text = `Hai! Aku nemu ide kado nih: ${nama} (Estimasi: ${harga}). Cek yuk!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Tweaking AI
        async function filterResults(tipe) {
            const hobi = document.getElementById('hobi').value;
            document.getElementById('hobi').value = `${hobi}, tolong cari opsi yang ${tipe} saja`;
            document.getElementById('giftForm').dispatchEvent(new Event('submit'));
        }

        // Submit Handler
        document.getElementById('giftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('filterSection').classList.add('hidden');
            document.getElementById('resultsContainer').innerHTML = '';

            const prompt = `Berikan 3 rekomendasi kado untuk usia ${document.getElementById('usia').value} hobi ${document.getElementById('hobi').value} budget ${document.getElementById('budget').value}. Format JSON: {recommendations: [{namaKado, estimasiHarga, alasan, kataKunciPencarian}]}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                const recs = JSON.parse(jsonText).recommendations;

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('filterSection').classList.remove('hidden');
                
                recs.forEach(kado => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-xl shadow border";
                    div.innerHTML = `
                        <h3 class="font-bold">${kado.namaKado}</h3>
                        <p class="text-pink-600 text-sm font-semibold">${kado.estimasiHarga}</p>
                        <p class="text-sm my-2">${kado.alasan}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="shareWA('${kado.namaKado}', '${kado.estimasiHarga}')" class="text-sm bg-gray-100 px-3 py-1 rounded">Bagikan WA</button>
                            <button onclick="toggleFavorite(this, '${kado.namaKado}')" class="text-lg">❤️</button>
                        </div>
                    `;
                    document.getElementById('resultsContainer').appendChild(div);
                });
            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('loadingState').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
