<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GIFTo - Asisten AI pencari kado praktis untuk orang tersayang.">
    <meta name="theme-color" content="#ec4899">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>GIFTo - AI Gift Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        /* Menggunakan font Nunito agar lebih membulat dan ceria */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body { font-family: 'Nunito', sans-serif; overflow-x: hidden; }

        /* Animasi pop-in dikalemin: dari overshoot/bouncy jadi ease-out halus */
        .pop-in { animation: popIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: scale(0.97) translateY(6px); }
        @keyframes popIn { to { opacity: 1; transform: scale(1) translateY(0); } }

        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid white; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        .spinner-large { width: 40px; height: 40px; border-width: 4px; border-top-width: 4px; border-color: rgba(236, 72, 153, 0.2); border-top-color: #ec4899; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Efek Kaca (Glassmorphism) - blur dikurangi sedikit untuk performa */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.15);
        }
        .dark .glass-card {
            background: rgba(31, 41, 55, 0.75);
            border: 1px solid rgba(75, 85, 99, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Hormati preferensi reduced-motion pengguna */
        @media (prefers-reduced-motion: reduce) {
            .pop-in { animation: none !important; opacity: 1 !important; transform: none !important; }
            .spinner, .spinner-large { animation: none !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-pink-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 p-4 md:p-8 transition-colors relative z-0">

    <!-- Blob latar dikalemin: dari 3 jadi 2, animate-pulse dihapus, ukuran & opacity diturunkan -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-[380px] h-[380px] bg-pink-300 dark:bg-pink-900/25 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-35"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[340px] h-[340px] bg-orange-200 dark:bg-orange-900/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-35"></div>
    </div>

    <div class="max-w-4xl mx-auto space-y-8 relative z-10">

        <div class="flex justify-end flex-wrap gap-2 pop-in">
            <button id="installBtn" class="hidden bg-gradient-to-r from-pink-500 to-orange-400 text-white rounded-full px-4 py-2 text-sm font-bold shadow-md hover:shadow-lg transition transform hover:-translate-y-0.5">⬇️ Install App</button>
            <button id="historyToggleBtn" class="glass-card rounded-full px-4 py-2 text-sm font-bold text-pink-600 dark:text-pink-400 shadow-sm hover:scale-105 transition">🕒 Riwayat</button>
            <button id="favToggleBtn" class="glass-card rounded-full px-4 py-2 text-sm font-bold text-pink-600 dark:text-pink-400 shadow-sm hover:scale-105 transition flex items-center gap-1">
                ❤️ Favorit
                <span id="favCount" class="hidden bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
            <button id="themeToggleBtn" class="glass-card rounded-full w-10 h-10 flex items-center justify-center text-sm shadow-sm hover:scale-105 transition">🌙</button>
        </div>

        <div class="text-center space-y-3 pop-in">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-gray-900 dark:text-white drop-shadow-sm">GIF<span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400">To</span></h1>
            <p class="text-lg font-medium text-gray-600 dark:text-gray-300">Asisten AI pencari kado praktis</p>
        </div>

        <div id="historySection" class="hidden glass-card rounded-3xl p-6 pop-in">
            <div class="flex items-center justify-between mb-4 border-b border-gray-200 dark:border-gray-700 pb-3">
                <h2 class="font-bold text-xl text-pink-600 dark:text-pink-400">Riwayat Pencarian</h2>
                <div class="flex gap-3 items-center">
                    <button id="clearHistoryBtn" class="text-xs font-bold bg-red-100 text-red-600 px-3 py-1.5 rounded-full hover:bg-red-200 transition">Hapus Semua</button>
                    <button onclick="document.getElementById('historySection').classList.add('hidden')" class="text-gray-500 hover:text-gray-800 dark:hover:text-white text-sm font-bold bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-full transition">Tutup ✕</button>
                </div>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div id="favoritSection" class="hidden glass-card rounded-3xl p-6 pop-in">
            <div class="flex items-center justify-between mb-4 border-b border-gray-200 dark:border-gray-700 pb-3">
                <h2 class="font-bold text-xl text-pink-600 dark:text-pink-400">Kado Favorit Saya</h2>
                <button onclick="document.getElementById('favoritSection').classList.add('hidden')" class="text-gray-500 hover:text-gray-800 dark:hover:text-white text-sm font-bold bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-full transition">Tutup ✕</button>
            </div>
            <div id="favoritList" class="space-y-4"></div>
        </div>

        <div class="grid md:grid-cols-12 gap-8 items-start pop-in" style="animation-delay: 0.1s;">

            <div class="md:col-span-5 glass-card rounded-3xl p-6">
                <form id="giftForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="hubungan" id="hubungan" class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700/70 dark:text-white focus:ring-2 focus:ring-pink-400 outline-none transition-all">
                            <option value="Teman">Teman</option>
                            <option value="Sahabat">Sahabat</option>
                            <option value="Pacar">Pacar</option>
                            <option value="Suami/Istri">Suami/Istri</option>
                            <option value="Orang Tua">Orang Tua</option>
                            <option value="Anak">Anak</option>
                            <option value="Saudara">Saudara</option>
                            <option value="Atasan/Bos">Atasan/Bos</option>
                            <option value="Rekan Kerja">Rekan Kerja</option>
                            <option value="Guru/Dosen">Guru/Dosen</option>
                        </select>
                        <select name="acara" id="acara" class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700/70 dark:text-white focus:ring-2 focus:ring-pink-400 outline-none transition-all">
                            <option value="Ulang Tahun">Ulang Tahun</option>
                            <option value="Anniversary">Anniversary</option>
                            <option value="Wisuda">Wisuda</option>
                            <option value="Pernikahan">Pernikahan</option>
                            <option value="Kelahiran Bayi">Kelahiran Bayi</option>
                            <option value="Kenaikan Jabatan">Kenaikan Jabatan</option>
                            <option value="Lebaran">Lebaran</option>
                            <option value="Natal">Natal</option>
                            <option value="Perpisahan">Perpisahan</option>
                            <option value="Tanpa Acara Khusus">Tanpa Acara Khusus</option>
                        </select>
                    </div>
                    <input type="number" id="usia" min="1" max="120" placeholder="Usia (Cth: 25)" required class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700/70 dark:text-white dark:placeholder-gray-400 focus:ring-2 focus:ring-pink-400 outline-none transition-all" />
                    <textarea id="hobi" placeholder="Hobi atau minat (Cth: Suka ngopi, nonton drakor)..." required rows="3" class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700/70 dark:text-white dark:placeholder-gray-400 focus:ring-2 focus:ring-pink-400 outline-none transition-all"></textarea>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 font-bold pointer-events-none">Rp</span>
                        <input type="text" inputmode="numeric" id="budget" placeholder="150.000" required class="w-full p-3.5 pl-11 rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700/70 dark:text-white dark:placeholder-gray-400 focus:ring-2 focus:ring-pink-400 outline-none transition-all" />
                    </div>

                    <div id="formError" class="hidden text-sm font-medium text-red-600 dark:text-red-300 bg-red-50 dark:bg-red-900/30 border border-red-100 dark:border-red-800 rounded-lg px-4 py-3"></div>

                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 hover:from-pink-600 hover:to-orange-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transform transition-all hover:-translate-y-1 hover:shadow-xl shadow-pink-200 dark:shadow-none">
                        <span id="btnText">✨ Temukan Kado Terbaik</span>
                        <div id="btnSpinner" class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <div class="md:col-span-7">
                <div id="filterSection" class="hidden flex gap-2 mb-4">
                    <button onclick="filterResults('lebih murah')" class="text-sm font-bold glass-card text-pink-600 dark:text-pink-300 px-5 py-2.5 rounded-full hover:scale-105 transition">💰 Lebih Murah</button>
                    <button onclick="filterResults('lebih unik')" class="text-sm font-bold glass-card text-purple-600 dark:text-purple-300 px-5 py-2.5 rounded-full hover:scale-105 transition">✨ Lebih Unik</button>
                </div>

                <div id="loadingState" class="hidden h-64 flex flex-col items-center justify-center space-y-4 glass-card rounded-3xl">
                    <div class="spinner-large"></div>
                    <p class="text-pink-600 dark:text-pink-400 font-bold">Meracik ide kado spesial...</p>
                </div>

                <div id="resultsContainer" class="space-y-5"></div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan API Key Anda di sini
        const part1 = "AQ.Ab8RN6IMlDhWNh55tS8";
        const part2 = "foeK-K_9NWhZDImvaqQsg_mmy7vA1Sg";
        const GEMINI_API_KEY = part1 + part2;

        // ===== Dark mode =====
        function applyTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggleBtn').textContent = isDark ? '☀️' : '🌙';
        }
        document.getElementById('themeToggleBtn').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            applyTheme(!document.documentElement.classList.contains('dark'));
        });

        // ===== PWA install prompt =====
        let deferredInstallPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            document.getElementById('installBtn').classList.add('hidden');
        });
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((err) => console.log('SW registration gagal:', err));
            });
        }

        // ===== Image Generator (Pollinations) =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function buildImageUrl(kado) {
            const promptBase = kado.kataKunciPencarian || kado.namaKado || 'kado';
            const prompt = `product photo of ${promptBase}, clean white background, studio lighting, high quality`;
            const seed = hashString(kado.namaKado || promptBase) % 100000;
            return `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?width=400&height=300&nologo=true&model=flux&seed=${seed}`;
        }

        // ===== Favorit =====
        function getFavorites() {
            try {
                const raw = JSON.parse(localStorage.getItem('favs') || '[]');
                return raw.map(item => typeof item === 'string'
                    ? { namaKado: item, estimasiHarga: '', alasan: '', kataKunciPencarian: '' }
                    : item);
            } catch { return []; }
        }
        function saveFavorites(favs) { localStorage.setItem('favs', JSON.stringify(favs)); }
        function isFavorited(namaKado) { return getFavorites().some(f => f.namaKado === namaKado); }
        function toggleFavorite(kado, btnEl) {
            let favs = getFavorites();
            if (isFavorited(kado.namaKado)) {
                favs = favs.filter(f => f.namaKado !== kado.namaKado);
            } else {
                favs.push(kado);
            }
            saveFavorites(favs);
            if (btnEl) btnEl.style.color = isFavorited(kado.namaKado) ? '#db2777' : '#9ca3af';
            renderFavoritPanel();
        }
        function renderFavoritPanel() {
            const favs = getFavorites();
            const countBadge = document.getElementById('favCount');
            countBadge.textContent = favs.length;
            countBadge.classList.toggle('hidden', favs.length === 0);

            const container = document.getElementById('favoritList');
            container.innerHTML = '';
            if (favs.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-500 font-medium text-center py-6';
                empty.textContent = 'Belum ada kado favorit. Tap ❤️ pada hasil rekomendasi untuk menyimpannya.';
                container.appendChild(empty);
                return;
            }
            favs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));
        }
        document.getElementById('favToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('favoritSection');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderFavoritPanel();
        });

        // ===== Riwayat Pencarian =====
        const HISTORY_KEY = 'kadoHistory';
        const HISTORY_LIMIT = 10;

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
        }
        function saveHistory(list) { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }
        function addHistoryEntry(input, recs) {
            const list = getHistory();
            list.unshift({ id: Date.now().toString(), timestamp: new Date().toISOString(), input, recs });
            while (list.length > HISTORY_LIMIT) list.pop();
            saveHistory(list);
            renderHistoryPanel();
        }
        function formatTimestamp(iso) {
            return new Date(iso).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function renderHistoryPanel() {
            const list = getHistory();
            const container = document.getElementById('historyList');
            container.innerHTML = '';

            if (list.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-500 font-medium text-center py-6';
                empty.textContent = 'Belum ada riwayat pencarian.';
                container.appendChild(empty);
                return;
            }

            list.forEach((entry) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-white/50 dark:bg-gray-700/50 rounded-xl px-4 py-3 cursor-pointer hover:bg-pink-50 dark:hover:bg-gray-600 border border-gray-100 dark:border-gray-600 transition';

                const info = document.createElement('div');
                info.className = 'flex-1 min-w-0';

                const summary = document.createElement('p');
                summary.className = 'text-sm font-bold text-gray-800 dark:text-gray-200 truncate';
                const budgetNum = Number(entry.input.budget) || 0;
                summary.textContent = `${entry.input.hubungan} • ${entry.input.acara} • Rp${budgetNum.toLocaleString('id-ID')}`;

                const time = document.createElement('p');
                time.className = 'text-xs font-semibold text-pink-500 mt-0.5';
                time.textContent = formatTimestamp(entry.timestamp);

                info.appendChild(summary);
                info.appendChild(time);

                const delBtn = document.createElement('button');
                delBtn.className = 'text-gray-400 hover:text-red-500 px-2 text-lg shrink-0 transition hover:scale-110';
                delBtn.textContent = '🗑';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveHistory(getHistory().filter(h => h.id !== entry.id));
                    renderHistoryPanel();
                });

                item.addEventListener('click', () => {
                    document.getElementById('hubungan').value = entry.input.hubungan;
                    document.getElementById('acara').value = entry.input.acara;
                    document.getElementById('usia').value = entry.input.usia;
                    document.getElementById('hobi').value = entry.input.hobi;
                    document.getElementById('budget').value = formatRupiah(String(entry.input.budget));

                    const resultsContainer = document.getElementById('resultsContainer');
                    resultsContainer.innerHTML = '';
                    entry.recs.forEach((kado, i) => resultsContainer.appendChild(createKadoCard(kado, i)));
                    document.getElementById('filterSection').classList.remove('hidden');
                    document.getElementById('historySection').classList.add('hidden');
                });

                item.appendChild(info);
                item.appendChild(delBtn);
                container.appendChild(item);
            });
        }
        document.getElementById('historyToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('historySection');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderHistoryPanel();
        });
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            saveHistory([]);
            renderHistoryPanel();
        });

        // ===== Share WA =====
        function shareWA(nama, harga) {
            const text = `Hai! Aku nemu ide kado nih: ${nama} (Estimasi: ${harga}). Gimana menurutmu?`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // ===== Render Kartu Kado =====
        function createKadoCard(kado, index) {
            const card = document.createElement('div');
            card.className = 'glass-card p-5 rounded-3xl pop-in relative overflow-hidden flex flex-col md:flex-row gap-5';
            card.style.animationDelay = `${index * 90}ms`;

            const imgWrap = document.createElement('div');
            imgWrap.className = 'w-full md:w-1/3 h-48 md:h-auto shrink-0 rounded-2xl overflow-hidden bg-white/50 dark:bg-gray-700 flex items-center justify-center shadow-inner';
            const img = document.createElement('img');
            img.src = buildImageUrl(kado);
            img.alt = kado.namaKado || 'Ilustrasi kado';
            img.loading = 'lazy';
            img.className = 'w-full h-full object-cover transform transition duration-500 hover:scale-105';
            img.onerror = () => {
                imgWrap.innerHTML = '';
                const fallback = document.createElement('span');
                fallback.className = 'text-5xl';
                fallback.textContent = '🎁';
                imgWrap.appendChild(fallback);
            };
            imgWrap.appendChild(img);

            const content = document.createElement('div');
            content.className = 'flex-1 flex flex-col justify-center';

            const title = document.createElement('h3');
            title.className = 'font-extrabold text-2xl text-gray-900 dark:text-white leading-tight';
            title.textContent = kado.namaKado;

            const priceWrap = document.createElement('div');
            priceWrap.className = 'mt-2 mb-3';
            const price = document.createElement('span');
            price.className = 'text-pink-600 dark:text-pink-400 text-sm font-extrabold bg-pink-100 dark:bg-pink-900/30 px-3 py-1 rounded-lg inline-block';
            price.textContent = kado.estimasiHarga;
            priceWrap.appendChild(price);

            const reason = document.createElement('p');
            reason.className = 'text-sm text-gray-700 dark:text-gray-300 leading-relaxed font-medium mb-5';
            reason.textContent = kado.alasan;

            const actions = document.createElement('div');
            actions.className = 'flex flex-wrap gap-2 items-center mt-auto';

            const waBtn = document.createElement('button');
            waBtn.className = 'text-sm font-bold bg-white dark:bg-gray-700 text-green-600 border border-green-200 dark:border-green-800 hover:bg-green-50 dark:hover:bg-gray-600 px-4 py-2 rounded-xl transition shadow-sm';
            waBtn.textContent = '💬 Bagikan';
            waBtn.addEventListener('click', () => shareWA(kado.namaKado, kado.estimasiHarga));
            actions.appendChild(waBtn);

            if (kado.kataKunciPencarian) {
                const tokopediaLink = document.createElement('a');
                tokopediaLink.href = `https://www.tokopedia.com/search?st=product&q=${encodeURIComponent(kado.kataKunciPencarian)}`;
                tokopediaLink.target = '_blank';
                tokopediaLink.rel = 'noopener noreferrer';
                tokopediaLink.className = 'text-sm font-bold bg-white dark:bg-gray-700 text-blue-600 border border-blue-200 dark:border-blue-800 hover:bg-blue-50 dark:hover:bg-gray-600 px-4 py-2 rounded-xl transition shadow-sm flex items-center gap-1';
                tokopediaLink.textContent = '🛒 Tokopedia';
                actions.appendChild(tokopediaLink);

                const shopeeLink = document.createElement('a');
                shopeeLink.href = `https://shopee.co.id/search?keyword=${encodeURIComponent(kado.kataKunciPencarian)}`;
                shopeeLink.target = '_blank';
                shopeeLink.rel = 'noopener noreferrer';
                shopeeLink.className = 'text-sm font-bold bg-white dark:bg-gray-700 text-orange-600 border border-orange-200 dark:border-orange-800 hover:bg-orange-50 dark:hover:bg-gray-600 px-4 py-2 rounded-xl transition shadow-sm flex items-center gap-1';
                shopeeLink.textContent = '🛍️ Shopee';
                actions.appendChild(shopeeLink);
            }

            const favBtn = document.createElement('button');
            favBtn.className = 'text-2xl transition ml-auto hover:scale-110';
            favBtn.textContent = '❤️';
            favBtn.style.color = isFavorited(kado.namaKado) ? '#db2777' : '#9ca3af';
            favBtn.addEventListener('click', () => toggleFavorite(kado, favBtn));
            actions.appendChild(favBtn);

            content.appendChild(title);
            content.appendChild(priceWrap);
            content.appendChild(reason);
            content.appendChild(actions);

            card.appendChild(imgWrap);
            card.appendChild(content);
            return card;
        }

        // ===== Tweaking AI =====
        async function filterResults(tipe) {
            const hobi = document.getElementById('hobi').value;
            document.getElementById('hobi').value = `${hobi}, tolong cari opsi yang ${tipe} saja`;
            document.getElementById('giftForm').dispatchEvent(new Event('submit'));
        }

        // ===== Format Rupiah pada input budget =====
        function formatRupiah(value) {
            const digits = value.replace(/\D/g, '');
            if (!digits) return '';
            return Number(digits).toLocaleString('id-ID');
        }
        function getRawBudget() {
            return document.getElementById('budget').value.replace(/\D/g, '');
        }
        document.getElementById('budget').addEventListener('input', (e) => {
            e.target.value = formatRupiah(e.target.value);
        });

        // ===== Validasi =====
        function validateForm() {
            const usia = Number(document.getElementById('usia').value);
            const budget = Number(getRawBudget());
            const errorBox = document.getElementById('formError');
            errorBox.classList.add('hidden');
            errorBox.textContent = '';

            if (!usia || usia < 1 || usia > 120) {
                errorBox.textContent = 'Mohon masukkan usia yang valid (1-120 tahun).';
                errorBox.classList.remove('hidden'); return false;
            }
            if (!budget || budget < 1000) {
                errorBox.textContent = 'Budget rasanya terlalu kecil, minimal Rp1.000 ya.';
                errorBox.classList.remove('hidden'); return false;
            }
            return true;
        }

        // ===== Submit Handler =====
        document.getElementById('giftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('filterSection').classList.add('hidden');
            document.getElementById('resultsContainer').innerHTML = '';

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            btn.disabled = true;
            btnText.textContent = 'Meracik Ide...';
            btnSpinner.classList.remove('hidden');

            const formInput = {
                hubungan: document.getElementById('hubungan').value,
                acara: document.getElementById('acara').value,
                usia: document.getElementById('usia').value,
                hobi: document.getElementById('hobi').value,
                budget: getRawBudget()
            };

            const prompt = `Berikan 6 rekomendasi kado yang sangat bervariasi dan unik untuk ${formInput.hubungan} dalam rangka ${formInput.acara}, usia ${formInput.usia} tahun, dengan hobi/minat: ${formInput.hobi}. Budget maksimal Rp${formInput.budget}. Format JSON: {recommendations: [{namaKado, estimasiHarga, alasan, kataKunciPencarian}]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                const recs = JSON.parse(jsonText).recommendations;

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('filterSection').classList.remove('hidden');

                const container = document.getElementById('resultsContainer');
                recs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));

                addHistoryEntry(formInput, recs);
            } catch (err) {
                document.getElementById('loadingState').classList.add('hidden');
                const errorBox = document.getElementById('formError');
                errorBox.textContent = 'Oops! Gagal mengambil rekomendasi. Coba lagi.';
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = '✨ Temukan Kado Terbaik';
                btnSpinner.classList.add('hidden');
            }
        });

        // Initialize UI
        renderFavoritPanel();
        renderHistoryPanel();
    </script>
</body>
</html>
