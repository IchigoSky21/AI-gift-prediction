<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KadoTepat - AI Gift Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan font Nunito yang lebih bulat dan ramah */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Animasi Pop-Up memantul yang ceria */
        .pop-in { 
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; 
            opacity: 0; 
            transform: scale(0.9);
        }
        
        @keyframes popIn { 
            to { opacity: 1; transform: scale(1); } 
        }
        
        .spinner { 
            border: 3px solid rgba(255, 255, 255, 0.3); 
            border-radius: 50%; 
            border-top: 3px solid white; 
            width: 24px; height: 24px; 
            animation: spin 1s linear infinite; 
        }
        .spinner-large { 
            width: 40px; height: 40px; border-width: 4px; border-top-width: 4px;
            border-color: rgba(236, 72, 153, 0.2); border-top-color: #ec4899;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Efek Kaca (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.15);
        }
    </style>
</head>
<body class="min-h-screen bg-pink-50 text-gray-800 p-4 md:p-8 relative">

    <!-- Dekorasi Background Blobs (Warna-warni ceria yang di-blur) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse"></div>
        <div class="absolute top-[20%] right-[-10%] w-[400px] h-[400px] bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
    </div>

    <!-- Konten Utama -->
    <div class="max-w-4xl mx-auto space-y-8 relative z-10">
        
        <!-- Header -->
        <div class="text-center space-y-3 pop-in relative">
            <button id="favToggleBtn" class="absolute right-0 top-0 bg-white border border-pink-200 rounded-full px-3 py-1.5 text-sm font-bold text-pink-600 shadow-sm hover:bg-pink-50 transition flex items-center gap-1 hover:scale-105">
                ❤️ Favorit
                <span id="favCount" class="hidden bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900">Kado<span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400">Tepat</span></h1>
            <p class="text-lg text-gray-600 font-medium">Asisten AI pencari kado sempurna.</p>
        </div>

        <!-- Panel Favorit -->
        <div id="favoritSection" class="hidden glass-card rounded-3xl p-6 pop-in">
            <div class="flex items-center justify-between mb-4 border-b border-gray-100 pb-2">
                <h2 class="font-bold text-xl text-pink-600">Kado Favorit Saya</h2>
                <button onclick="document.getElementById('favoritSection').classList.add('hidden')" class="text-gray-400 hover:text-gray-800 text-sm font-bold bg-gray-100 px-3 py-1 rounded-full">Tutup ✕</button>
            </div>
            <div id="favoritList" class="space-y-4"></div>
        </div>

        <!-- Grid Layout -->
        <div class="grid md:grid-cols-12 gap-8 items-start pop-in" style="animation-delay: 0.1s;">
            
            <!-- Sisi Kiri: Form -->
            <div class="md:col-span-5 glass-card rounded-3xl p-6">
                <form id="giftForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="hubungan" id="hubungan" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition-all">
                            <option value="Teman">Teman</option>
                            <option value="Pacar">Pacar</option>
                            <option value="Suami/Istri">Suami/Istri</option>
                        </select>
                        <select name="acara" id="acara" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition-all">
                            <option value="Ulang Tahun">Ulang Tahun</option>
                            <option value="Anniversary">Anniversary</option>
                        </select>
                    </div>
                    <input type="number" id="usia" min="1" max="120" placeholder="Usia (Cth: 25)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-pink-400 outline-none transition-all" />
                    <textarea id="hobi" placeholder="Hobi atau minat..." required rows="3" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-pink-400 outline-none transition-all"></textarea>
                    <input type="number" id="budget" min="1000" placeholder="Budget Maksimal (Rp)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-pink-400 outline-none transition-all" />
                    
                    <div id="formError" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 hover:from-pink-600 hover:to-orange-500 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transform transition-all hover:-translate-y-1 hover:shadow-xl shadow-pink-200">
                        <span id="btnText">✨ Temukan Kado Terbaik</span>
                        <div id="btnSpinner" class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- Sisi Kanan: Hasil -->
            <div class="md:col-span-7">
                <div id="filterSection" class="hidden flex gap-2 mb-4">
                    <button onclick="filterResults('lebih murah')" class="text-sm font-bold bg-white text-pink-600 px-4 py-2 rounded-full border border-pink-200 shadow-sm hover:bg-pink-50 transition hover:-translate-y-0.5">💰 Lebih Murah</button>
                    <button onclick="filterResults('lebih unik')" class="text-sm font-bold bg-white text-purple-600 px-4 py-2 rounded-full border border-purple-200 shadow-sm hover:bg-purple-50 transition hover:-translate-y-0.5">✨ Lebih Unik</button>
                </div>
                
                <div id="loadingState" class="hidden h-64 flex flex-col items-center justify-center space-y-4 glass-card rounded-3xl">
                    <div class="spinner-large"></div>
                    <p class="text-pink-600 font-bold animate-pulse">Meracik ide kado spesial...</p>
                </div>
                
                <div id="resultsContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // API Key
        const part1 = "AQ.Ab8RN6IMlDhWNh55tS8";
        const part2 = "foeK-K_9NWhZDImvaqQsg_mmy7vA1Sg";
        const GEMINI_API_KEY = part1 + part2;

        // ===== Favorit =====
        function getFavorites() {
            try {
                const raw = JSON.parse(localStorage.getItem('favs') || '[]');
                return raw.map(item => typeof item === 'string' ? { namaKado: item, estimasiHarga: '', alasan: '', kataKunciPencarian: '' } : item);
            } catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('favs', JSON.stringify(favs));
        }

        function isFavorited(namaKado) {
            return getFavorites().some(f => f.namaKado === namaKado);
        }

        function toggleFavorite(kado, btnEl) {
            let favs = getFavorites();
            if (isFavorited(kado.namaKado)) {
                favs = favs.filter(f => f.namaKado !== kado.namaKado);
            } else {
                favs.push(kado);
            }
            saveFavorites(favs);
            if (btnEl) btnEl.style.color = isFavorited(kado.namaKado) ? '#db2777' : '#9ca3af';
            renderFavoritPanel();
        }

        function renderFavoritPanel() {
            const favs = getFavorites();
            const countBadge = document.getElementById('favCount');
            countBadge.textContent = favs.length;
            countBadge.classList.toggle('hidden', favs.length === 0);

            const container = document.getElementById('favoritList');
            container.innerHTML = '';

            if (favs.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-500 text-center py-6 font-medium';
                empty.textContent = 'Belum ada kado favorit. Tap ❤️ pada hasil rekomendasi untuk menyimpannya di sini.';
                container.appendChild(empty);
                return;
            }

            favs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));
        }

        document.getElementById('favToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('favoritSection');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderFavoritPanel();
        });

        // ===== Share WA =====
        function shareWA(nama, harga) {
            const text = `Hai! Aku nemu ide kado nih: ${nama} (Estimasi: ${harga}). Gimana menurutmu?`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // ===== Render Kartu Kado =====
        function createKadoCard(kado, index) {
            const card = document.createElement('div');
            card.className = 'glass-card p-5 rounded-2xl pop-in relative overflow-hidden';
            card.style.animationDelay = `${index * 90}ms`;

            // Aksen warna pink di pinggir kiri kartu
            const accent = document.createElement('div');
            accent.className = 'absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-pink-400 to-orange-400';
            card.appendChild(accent);

            const title = document.createElement('h3');
            title.className = 'font-bold text-xl text-gray-800 ml-2';
            title.textContent = kado.namaKado;

            const price = document.createElement('p');
            price.className = 'text-pink-600 text-sm font-extrabold mt-1 ml-2 bg-pink-100 inline-block px-2 py-0.5 rounded-md';
            price.textContent = kado.estimasiHarga;

            const reason = document.createElement('p');
            reason.className = 'text-sm mt-3 mb-4 text-gray-700 leading-relaxed ml-2';
            reason.textContent = kado.alasan;

            const actions = document.createElement('div');
            actions.className = 'flex flex-wrap gap-2 items-center ml-2 border-t border-gray-100 pt-3';

            const waBtn = document.createElement('button');
            waBtn.className = 'text-sm font-bold bg-green-50 text-green-600 border border-green-200 hover:bg-green-100 px-3 py-1.5 rounded-lg transition';
            waBtn.textContent = '💬 Bagikan';
            waBtn.addEventListener('click', () => shareWA(kado.namaKado, kado.estimasiHarga));
            actions.appendChild(waBtn);

            if (kado.kataKunciPencarian) {
                const tokopediaLink = document.createElement('a');
                tokopediaLink.href = `https://www.tokopedia.com/search?st=product&q=${encodeURIComponent(kado.kataKunciPencarian)}`;
                tokopediaLink.target = '_blank';
                tokopediaLink.rel = 'noopener noreferrer';
                tokopediaLink.className = 'text-sm font-bold bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition flex items-center gap-1';
                tokopediaLink.textContent = '🛒 Tokopedia';
                actions.appendChild(tokopediaLink);

                const shopeeLink = document.createElement('a');
                shopeeLink.href = `https://shopee.co.id/search?keyword=${encodeURIComponent(kado.kataKunciPencarian)}`;
                shopeeLink.target = '_blank';
                shopeeLink.rel = 'noopener noreferrer';
                shopeeLink.className = 'text-sm font-bold bg-orange-50 text-orange-600 border border-orange-200 hover:bg-orange-100 px-3 py-1.5 rounded-lg transition flex items-center gap-1';
                shopeeLink.textContent = '🛍️ Shopee';
                actions.appendChild(shopeeLink);
            }

            const favBtn = document.createElement('button');
            favBtn.className = 'text-xl transition ml-auto hover:scale-125';
            favBtn.textContent = '❤️';
            favBtn.style.color = isFavorited(kado.namaKado) ? '#db2777' : '#9ca3af';
            favBtn.addEventListener('click', () => toggleFavorite(kado, favBtn));
            actions.appendChild(favBtn);

            card.appendChild(title);
            card.appendChild(price);
            card.appendChild(reason);
            card.appendChild(actions);
            return card;
        }

        // ===== Tweaking AI =====
        async function filterResults(tipe) {
            const hobi = document.getElementById('hobi').value;
            document.getElementById('hobi').value = `${hobi}, tolong cari opsi yang ${tipe} saja`;
            document.getElementById('giftForm').dispatchEvent(new Event('submit'));
        }

        // ===== Validasi =====
        function validateForm() {
            const usia = Number(document.getElementById('usia').value);
            const budget = Number(document.getElementById('budget').value);
            const errorBox = document.getElementById('formError');
            errorBox.classList.add('hidden');
            errorBox.textContent = '';

            if (!usia || usia < 1 || usia > 120) {
                errorBox.textContent = 'Mohon masukkan usia yang valid (1-120 tahun).';
                errorBox.classList.remove('hidden'); return false;
            }
            if (!budget || budget < 1000) {
                errorBox.textContent = 'Budget rasanya terlalu kecil, minimal Rp1.000 ya.';
                errorBox.classList.remove('hidden'); return false;
            }
            return true;
        }

        // ===== Submit Handler =====
        document.getElementById('giftForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) return;

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('filterSection').classList.add('hidden');
            document.getElementById('resultsContainer').innerHTML = '';
            
            // Animasi Tombol
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            btn.disabled = true;
            btnText.textContent = 'Meracik Ide...';
            btnSpinner.classList.remove('hidden');

            const prompt = `Berikan 3 rekomendasi kado untuk usia ${document.getElementById('usia').value} hobi ${document.getElementById('hobi').value} budget ${document.getElementById('budget').value}. Format JSON: {recommendations: [{namaKado, estimasiHarga, alasan, kataKunciPencarian}]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|
```/g, '');
                const recs = JSON.parse(jsonText).recommendations;

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('filterSection').classList.remove('hidden');

                const container = document.getElementById('resultsContainer');
                recs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));
            } catch (err) {
                document.getElementById('loadingState').classList.add('hidden');
                const errorBox = document.getElementById('formError');
                errorBox.textContent = 'Oops! Gagal mengambil rekomendasi. Coba lagi.';
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = '✨ Temukan Kado Terbaik';
                btnSpinner.classList.add('hidden');
            }
        });

        // Initialize Badge
        renderFavoritPanel();
    </script>
</body>
</html>
