<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KadoTepat - Asisten AI pencari kado sempurna untuk orang tersayang.">
    <meta name="theme-color" content="#ec4899">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>KadoTepat - AI Gift Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(236, 72, 153, 0.2); border-radius: 50%; border-top: 3px solid #ec4899; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        .spinner-large { width: 40px; height: 40px; border-width: 4px; border-top-width: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-white to-purple-50 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 text-gray-800 dark:text-gray-100 p-4 md:p-8 transition-colors">

    <div class="max-w-4xl mx-auto space-y-8">

        <div class="flex justify-end flex-wrap gap-2 fade-in">
            <button id="installBtn" class="hidden bg-pink-600 text-white rounded-full px-3 py-1.5 text-sm font-medium shadow-sm hover:bg-pink-500 transition">⬇️ Install</button>
            <button id="historyToggleBtn" class="bg-white dark:bg-gray-800 border border-pink-200 dark:border-gray-700 rounded-full px-3 py-1.5 text-sm font-medium text-pink-600 dark:text-pink-400 shadow-sm hover:bg-pink-50 dark:hover:bg-gray-700 transition">🕒 Riwayat</button>
            <button id="favToggleBtn" class="bg-white dark:bg-gray-800 border border-pink-200 dark:border-gray-700 rounded-full px-3 py-1.5 text-sm font-medium text-pink-600 dark:text-pink-400 shadow-sm hover:bg-pink-50 dark:hover:bg-gray-700 transition flex items-center gap-1">
                ❤️ Favorit
                <span id="favCount" class="hidden bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
            <button id="themeToggleBtn" class="bg-white dark:bg-gray-800 border border-pink-200 dark:border-gray-700 rounded-full w-9 h-9 flex items-center justify-center text-sm shadow-sm hover:bg-pink-50 dark:hover:bg-gray-700 transition">🌙</button>
        </div>

        <div class="text-center space-y-3 fade-in">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 dark:text-white">Kado<span class="text-pink-600 dark:text-pink-400">Tepat</span></h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">Asisten AI pencari kado sempurna.</p>
        </div>

        <!-- Panel Riwayat -->
        <div id="historySection" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-xl shadow-pink-100/50 dark:shadow-none p-6 border border-gray-100 dark:border-gray-700 fade-in">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-lg">Riwayat Pencarian</h2>
                <div class="flex gap-3 items-center">
                    <button id="clearHistoryBtn" class="text-xs text-red-500 hover:text-red-700">Hapus Semua</button>
                    <button onclick="document.getElementById('historySection').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-sm">Tutup ✕</button>
                </div>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <!-- Panel Favorit -->
        <div id="favoritSection" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-xl shadow-pink-100/50 dark:shadow-none p-6 border border-gray-100 dark:border-gray-700 fade-in">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-lg">Kado Favorit Saya</h2>
                <button onclick="document.getElementById('favoritSection').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-sm">Tutup ✕</button>
            </div>
            <div id="favoritList" class="space-y-4"></div>
        </div>

        <div class="grid md:grid-cols-12 gap-8 items-start fade-in">
            <div class="md:col-span-5 bg-white dark:bg-gray-800 rounded-2xl shadow-xl shadow-pink-100/50 dark:shadow-none p-6 border border-gray-100 dark:border-gray-700">
                <form id="giftForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="hubungan" id="hubungan" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                            <option value="Teman">Teman</option>
                            <option value="Pacar">Pacar</option>
                            <option value="Suami/Istri">Suami/Istri</option>
                        </select>
                        <select name="acara" id="acara" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                            <option value="Ulang Tahun">Ulang Tahun</option>
                            <option value="Anniversary">Anniversary</option>
                        </select>
                    </div>
                    <input type="number" id="usia" min="1" max="120" placeholder="Usia (Cth: 25)" required class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400" />
                    <textarea id="hobi" placeholder="Hobi atau minat..." required rows="3" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"></textarea>
                    <input type="number" id="budget" min="1000" placeholder="Budget Maksimal (Rp)" required class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400" />
                    <div id="formError" class="hidden text-sm text-red-600 dark:text-red-300 bg-red-50 dark:bg-red-900/30 border border-red-100 dark:border-red-800 rounded-lg px-3 py-2"></div>
                    <button type="submit" id="submitBtn" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <span id="btnText">Temukan Kado Terbaik</span>
                        <div id="btnSpinner" class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <div class="md:col-span-7">
                <div id="filterSection" class="hidden flex gap-2 mb-4">
                    <button onclick="filterResults('lebih murah')" class="text-xs bg-pink-100 dark:bg-pink-900/40 text-pink-700 dark:text-pink-300 px-3 py-1 rounded-full hover:bg-pink-200 dark:hover:bg-pink-900/60 transition">💰 Lebih Murah</button>
                    <button onclick="filterResults('lebih unik')" class="text-xs bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-3 py-1 rounded-full hover:bg-purple-200 dark:hover:bg-purple-900/60 transition">✨ Lebih Unik</button>
                </div>
                <div id="loadingState" class="hidden h-64 flex items-center justify-center">
                    <div class="spinner-large"></div>
                </div>
                <div id="resultsContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan API Key Anda di sini
        const part1 = "AQ.Ab8RN6IMlDhWNh55tS8";
        const part2 = "foeK-K_9NWhZDImvaqQsg_mmy7vA1Sg";
        const GEMINI_API_KEY = part1 + part2;

        // ===== Dark mode =====
        function applyTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggleBtn').textContent = isDark ? '☀️' : '🌙';
        }
        document.getElementById('themeToggleBtn').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            applyTheme(!document.documentElement.classList.contains('dark'));
        });

        // ===== PWA install prompt =====
        let deferredInstallPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            document.getElementById('installBtn').classList.add('hidden');
        });
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((err) => console.log('SW registration gagal:', err));
            });
        }

        // ===== Util: hash sederhana untuk seed gambar konsisten per nama kado =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function buildImageUrl(kado) {
            const promptBase = kado.kataKunciPencarian || kado.namaKado || 'kado';
            const prompt = `product photo of ${promptBase}, clean white background, studio lighting, high quality`;
            const seed = hashString(kado.namaKado || promptBase) % 100000;
            return `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?width=400&height=300&nologo=true&model=flux&seed=${seed}`;
        }

        // ===== Favorit (disimpan sebagai object lengkap, bukan cuma nama) =====
        function getFavorites() {
            try {
                const raw = JSON.parse(localStorage.getItem('favs') || '[]');
                return raw.map(item => typeof item === 'string'
                    ? { namaKado: item, estimasiHarga: '', alasan: '', kataKunciPencarian: '' }
                    : item);
            } catch {
                return [];
            }
        }
        function saveFavorites(favs) { localStorage.setItem('favs', JSON.stringify(favs)); }
        function isFavorited(namaKado) { return getFavorites().some(f => f.namaKado === namaKado); }
        function toggleFavorite(kado, btnEl) {
            let favs = getFavorites();
            if (isFavorited(kado.namaKado)) {
                favs = favs.filter(f => f.namaKado !== kado.namaKado);
            } else {
                favs.push(kado);
            }
            saveFavorites(favs);
            if (btnEl) btnEl.style.color = isFavorited(kado.namaKado) ? '#db2777' : 'gray';
            renderFavoritPanel();
        }
        function renderFavoritPanel() {
            const favs = getFavorites();
            const countBadge = document.getElementById('favCount');
            countBadge.textContent = favs.length;
            countBadge.classList.toggle('hidden', favs.length === 0);

            const container = document.getElementById('favoritList');
            container.innerHTML = '';
            if (favs.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-400 text-center py-6';
                empty.textContent = 'Belum ada kado favorit. Tap ❤️ pada hasil rekomendasi untuk menyimpannya di sini.';
                container.appendChild(empty);
                return;
            }
            favs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));
        }
        document.getElementById('favToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('favoritSection');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderFavoritPanel();
        });

        // ===== Riwayat Pencarian =====
        const HISTORY_KEY = 'kadoHistory';
        const HISTORY_LIMIT = 10;

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
        }
        function saveHistory(list) { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }
        function addHistoryEntry(input, recs) {
            const list = getHistory();
            list.unshift({ id: Date.now().toString(), timestamp: new Date().toISOString(), input, recs });
            while (list.length > HISTORY_LIMIT) list.pop();
            saveHistory(list);
            renderHistoryPanel();
        }
        function formatTimestamp(iso) {
            return new Date(iso).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function renderHistoryPanel() {
            const list = getHistory();
            const container = document.getElementById('historyList');
            container.innerHTML = '';

            if (list.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-400 text-center py-6';
                empty.textContent = 'Belum ada riwayat pencarian.';
                container.appendChild(empty);
                return;
            }

            list.forEach((entry) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-pink-50 dark:bg-gray-700 rounded-lg px-4 py-3 cursor-pointer hover:bg-pink-100 dark:hover:bg-gray-600 transition';

                const info = document.createElement('div');
                info.className = 'flex-1 min-w-0';

                const summary = document.createElement('p');
                summary.className = 'text-sm font-medium truncate';
                const budgetNum = Number(entry.input.budget) || 0;
                summary.textContent = `${entry.input.hubungan} • ${entry.input.acara} • ${entry.input.usia} thn • Rp${budgetNum.toLocaleString('id-ID')}`;

                const time = document.createElement('p');
                time.className = 'text-xs text-gray-400';
                time.textContent = formatTimestamp(entry.timestamp);

                info.appendChild(summary);
                info.appendChild(time);

                const delBtn = document.createElement('button');
                delBtn.className = 'text-gray-400 hover:text-red-500 px-2 text-sm shrink-0';
                delBtn.textContent = '🗑';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveHistory(getHistory().filter(h => h.id !== entry.id));
                    renderHistoryPanel();
                });

                item.addEventListener('click', () => {
                    document.getElementById('hubungan').value = entry.input.hubungan;
                    document.getElementById('acara').value = entry.input.acara;
                    document.getElementById('usia').value = entry.input.usia;
                    document.getElementById('hobi').value = entry.input.hobi;
                    document.getElementById('budget').value = entry.input.budget;

                    const resultsContainer = document.getElementById('resultsContainer');
                    resultsContainer.innerHTML = '';
                    entry.recs.forEach((kado, i) => resultsContainer.appendChild(createKadoCard(kado, i)));
                    document.getElementById('filterSection').classList.remove('hidden');
                    document.getElementById('historySection').classList.add('hidden');
                });

                item.appendChild(info);
                item.appendChild(delBtn);
                container.appendChild(item);
            });
        }
        document.getElementById('historyToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('historySection');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderHistoryPanel();
        });
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            saveHistory([]);
            renderHistoryPanel();
        });

        // ===== Share WA =====
        function shareWA(nama, harga) {
            const text = `Hai! Aku nemu ide kado nih: ${nama} (Estimasi: ${harga}). Cek yuk!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // ===== Render satu kartu kado (DOM API, aman dari karakter aneh di hasil AI) =====
        function createKadoCard(kado, index) {
            const card = document.createElement('div');
            card.className = 'bg-white dark:bg-gray-800 p-4 rounded-xl shadow border border-gray-100 dark:border-gray-700 fade-in';
            card.style.animationDelay = `${index * 90}ms`;

            const imgWrap = document.createElement('div');
            imgWrap.className = 'w-full h-40 rounded-lg overflow-hidden mb-3 bg-pink-50 dark:bg-gray-700 flex items-center justify-center';
            const img = document.createElement('img');
            img.src = buildImageUrl(kado);
            img.alt = kado.namaKado || 'Ilustrasi kado';
            img.loading = 'lazy';
            img.className = 'w-full h-full object-cover';
            img.onerror = () => {
                imgWrap.innerHTML = '';
                const fallback = document.createElement('span');
                fallback.className = 'text-4xl';
                fallback.textContent = '🎁';
                imgWrap.appendChild(fallback);
            };
            imgWrap.appendChild(img);

            const title = document.createElement('h3');
            title.className = 'font-bold text-gray-900 dark:text-white';
            title.textContent = kado.namaKado;

            const price = document.createElement('p');
            price.className = 'text-pink-600 dark:text-pink-400 text-sm font-semibold';
            price.textContent = kado.estimasiHarga;

            const reason = document.createElement('p');
            reason.className = 'text-sm my-2 text-gray-600 dark:text-gray-300';
            reason.textContent = kado.alasan;

            const actions = document.createElement('div');
            actions.className = 'flex flex-wrap gap-2 mt-3 items-center';

            const waBtn = document.createElement('button');
            waBtn.className = 'text-sm bg-gray-100 dark:bg-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 px-3 py-1 rounded transition';
            waBtn.textContent = 'Bagikan WA';
            waBtn.addEventListener('click', () => shareWA(kado.namaKado, kado.estimasiHarga));
            actions.appendChild(waBtn);

            if (kado.kataKunciPencarian) {
                const tokopediaLink = document.createElement('a');
                tokopediaLink.href = `https://www.tokopedia.com/search?st=product&q=${encodeURIComponent(kado.kataKunciPencarian)}`;
                tokopediaLink.target = '_blank';
                tokopediaLink.rel = 'noopener noreferrer';
                tokopediaLink.className = 'text-sm bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 hover:bg-green-100 dark:hover:bg-green-900/50 px-3 py-1 rounded transition';
                tokopediaLink.textContent = '🛒 Tokopedia';
                actions.appendChild(tokopediaLink);

                const shopeeLink = document.createElement('a');
                shopeeLink.href = `https://shopee.co.id/search?keyword=${encodeURIComponent(kado.kataKunciPencarian)}`;
                shopeeLink.target = '_blank';
                shopeeLink.rel = 'noopener noreferrer';
                shopeeLink.className = 'text-sm bg-orange-50 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300 hover:bg-orange-100 dark:hover:bg-orange-900/50 px-3 py-1 rounded transition';
                shopeeLink.textContent = '🛍️ Shopee';
                actions.appendChild(shopeeLink);
            }

            const favBtn = document.createElement('button');
            favBtn.className = 'text-lg transition ml-auto';
            favBtn.textContent = '❤️';
            favBtn.style.color = isFavorited(kado.namaKado) ? '#db2777' : 'gray';
            favBtn.addEventListener('click', () => toggleFavorite(kado, favBtn));
            actions.appendChild(favBtn);

            card.appendChild(imgWrap);
            card.appendChild(title);
            card.appendChild(price);
            card.appendChild(reason);
            card.appendChild(actions);
            return card;
        }

        // ===== Tweaking AI (filter cepat) =====
        async function filterResults(tipe) {
            const hobi = document.getElementById('hobi').value;
            document.getElementById('hobi').value = `${hobi}, tolong cari opsi yang ${tipe} saja`;
            document.getElementById('giftForm').dispatchEvent(new Event('submit'));
        }

        // ===== Validasi form =====
        function validateForm() {
            const usia = Number(document.getElementById('usia').value);
            const budget = Number(document.getElementById('budget').value);
            const errorBox = document.getElementById('formError');
            errorBox.classList.add('hidden');
            errorBox.textContent = '';

            if (!usia || usia < 1 || usia > 120) {
                errorBox.textContent = 'Usia harus di antara 1 - 120 tahun.';
                errorBox.classList.remove('hidden');
                return false;
            }
            if (!budget || budget < 1000) {
                errorBox.textContent = 'Budget minimal Rp1.000.';
                errorBox.classList.remove('hidden');
                return false;
            }
            return true;
        }

        // ===== Submit Handler =====
        document.getElementById('giftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('filterSection').classList.add('hidden');
            document.getElementById('resultsContainer').innerHTML = '';

            const formInput = {
                hubungan: document.getElementById('hubungan').value,
                acara: document.getElementById('acara').value,
                usia: document.getElementById('usia').value,
                hobi: document.getElementById('hobi').value,
                budget: document.getElementById('budget').value
            };

            const prompt = `Berikan 3 rekomendasi kado untuk usia ${formInput.usia} hobi ${formInput.hobi} budget ${formInput.budget}. Format JSON: {recommendations: [{namaKado, estimasiHarga, alasan, kataKunciPencarian}]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                const recs = JSON.parse(jsonText).recommendations;

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('filterSection').classList.remove('hidden');

                const container = document.getElementById('resultsContainer');
                recs.forEach((kado, i) => container.appendChild(createKadoCard(kado, i)));

                addHistoryEntry(formInput, recs);
            } catch (err) {
                document.getElementById('loadingState').classList.add('hidden');
                const errorBox = document.getElementById('formError');
                errorBox.textContent = 'Gagal mengambil rekomendasi: ' + err.message;
                errorBox.classList.remove('hidden');
            }
        });

        // Render state awal saat halaman dibuka
        renderFavoritPanel();
    </script>
</body>
</html>
